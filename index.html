<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Financial Control Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1120;
  color:white;
  font-family:'Inter',sans-serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at top left,
      rgba(37,99,235,0.15),
      transparent 30%),

    radial-gradient(circle at bottom right,
      rgba(59,130,246,0.12),
      transparent 35%);

  z-index:-1;
}

.container{
  max-width:1700px;
  margin:auto;
  padding:30px;
}

/* HEADER */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:28px;
}

.header-left h1{
  font-size:38px;
  font-weight:700;
}

.header-left p{
  margin-top:8px;
  color:#94a3b8;
}

.header-right{
  display:flex;
  gap:14px;
}

.header-box{
  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  padding:14px 18px;

  border-radius:16px;

  color:#cbd5e1;
}

.status{
  color:#4ade80;
  font-weight:600;
}

/* CARD */

.card{
  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:24px;

  padding:24px;

  margin-bottom:24px;
}

.card-title{
  color:#94a3b8;
  font-size:14px;
}

.grid-4{
  display:grid;
  grid-template-columns:
    repeat(4,1fr);

  gap:20px;

  margin-bottom:24px;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;

  gap:20px;

  margin-bottom:24px;
}

.kpi{
  font-size:34px;
  font-weight:700;
  margin-top:14px;
}

.blue{
  color:#60a5fa;
}

.green{
  color:#4ade80;
}

.red{
  color:#fb7185;
}

input{
  width:100%;

  padding:14px;

  border:none;

  border-radius:14px;

  margin-top:12px;

  background:#1e293b;

  color:white;

  font-size:15px;
}

.upload{
  border:
    2px dashed rgba(255,255,255,0.08);

  border-radius:18px;

  padding:30px;

  text-align:center;
}

.upload p{
  color:#94a3b8;
  margin-top:10px;
}

/* SITE CARDS */

.site-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

  gap:20px;

  margin-bottom:24px;
}

.site-card{
  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:22px;

  padding:22px;

  transition:0.25s;

  cursor:pointer;

  position:relative;

  overflow:hidden;
}

.site-card:hover{

  transform:
    translateY(-4px);

  border-color:
    rgba(59,130,246,0.35);

  box-shadow:
    0 12px 30px rgba(37,99,235,0.12);

}

.site-card::before{

  content:"";

  position:absolute;

  width:140px;
  height:140px;

  background:
    radial-gradient(
      rgba(59,130,246,0.2),
      transparent 70%
    );

  top:-40px;
  right:-40px;

}

.site-name{
  font-size:18px;
  font-weight:600;
}

.site-cost{
  font-size:32px;
  font-weight:700;

  margin-top:14px;
}

.risk{
  margin-top:16px;

  display:inline-flex;

  align-items:center;

  gap:8px;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:600;
}

.high{
  background:#7f1d1d;
  color:#fecaca;
}

.medium{
  background:#78350f;
  color:#fde68a;
}

.low{
  background:#14532d;
  color:#bbf7d0;
}

/* CHART */

.chart-box{
  height:380px;
}

/* DETAIL */

.detail-item{
  background:#1e293b;

  border-radius:16px;

  padding:16px;

  margin-bottom:14px;
}

/* AI */

.insight{
  background:#1e293b;

  border-left:4px solid #3b82f6;

  padding:16px;

  border-radius:14px;

  margin-bottom:12px;
}

.alert{
  border-left-color:#ef4444;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;

  border-bottom:
    1px solid rgba(255,255,255,0.06);
}

th{
  color:#94a3b8;
  text-align:left;
}

.table-wrap{
  overflow:auto;
}

@media(max-width:1200px){

  .grid-4{
    grid-template-columns:
      1fr 1fr;
  }

}

@media(max-width:900px){

  .grid-2,
  .grid-4{
    grid-template-columns:1fr;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:20px;
  }

}

</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    <div class="header-left">

      <h1>
        Financial Control Center
      </h1>

      <p>
        AI 기반 사업소 비용 분석 시스템
      </p>

    </div>

    <div class="header-right">

      <div class="header-box status">
        ● AI NORMAL
      </div>

      <div class="header-box">
        2026 Dashboard
      </div>

    </div>

  </div>

  <!-- 업로드 -->

  <div class="card">

    <div class="upload">

      <input
        type="file"
        id="excelFile"
      />

      <p>
        사업소 / 계정과목 / 적요 / 금액 / 월
      </p>

    </div>

  </div>

  <!-- KPI -->

  <div class="grid-4">

    <div class="card">

      <div class="card-title">
        TOTAL COST
      </div>

      <div
        class="kpi red"
        id="totalCost"
      >
        ₩0
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        TOTAL SALES
      </div>

      <div
        class="kpi blue"
        id="totalSales"
      >
        ₩500,000,000
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        PROFIT RATE
      </div>

      <div
        class="kpi green"
        id="profitRate"
      >
        0%
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        CUT TARGET
      </div>

      <div
        class="kpi blue"
        id="cutAmount"
      >
        ₩0
      </div>

    </div>

  </div>

  <!-- 사업소 카드 -->

  <div
    class="site-grid"
    id="siteCards"
  ></div>

  <!-- 차트 -->

  <div class="grid-2">

    <div class="card">

      <div class="card-title">
        SITE COST RATIO
      </div>

      <div class="chart-box">
        <canvas id="siteChart"></canvas>
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        CATEGORY ANALYSIS
      </div>

      <div class="chart-box">
        <canvas id="categoryChart"></canvas>
      </div>

    </div>

  </div>

  <!-- 월별 -->

  <div class="card">

    <div class="card-title">
      MONTHLY TREND
    </div>

    <div class="chart-box">
      <canvas id="monthChart"></canvas>
    </div>

  </div>

  <!-- DETAIL -->

  <div
    class="card"
    id="detailPanel"
    style="display:none;"
  >

    <div
      style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
      "
    >

      <div>

        <div
          style="
            font-size:24px;
            font-weight:700;
          "
          id="detailTitle"
        >
        </div>

        <div
          style="
            color:#94a3b8;
            margin-top:8px;
          "
        >
          AI 사업소 상세 분석
        </div>

      </div>

      <button
        onclick="closeDetail()"
        style="
          background:#1e293b;
          border:none;
          color:white;
          padding:10px 16px;
          border-radius:12px;
          cursor:pointer;
        "
      >
        닫기
      </button>

    </div>

    <div class="grid-2">

      <div>

        <div
          class="card-title"
          style="margin-bottom:12px;"
        >
          비용 현황
        </div>

        <div id="detailCosts"></div>

      </div>

      <div>

        <div
          class="card-title"
          style="margin-bottom:12px;"
        >
          AI 인사이트
        </div>

        <div id="detailAI"></div>

      </div>

    </div>

  </div>

  <!-- AI -->

  <div class="card">

    <div class="card-title">
      AI ANALYSIS
    </div>

    <div id="insights"></div>

  </div>

</div>

<script>

let siteChart;
let categoryChart;
let monthChart;

window.onload = function(){

  const sample = [

    {
      사업소:"포항사업소",
      계정과목:"외주비",
      금액:9200000,
      월:"1월"
    },

    {
      사업소:"포항사업소",
      계정과목:"차량유지비",
      금액:4200000,
      월:"1월"
    },

    {
      사업소:"부산사업소",
      계정과목:"회의비",
      금액:1800000,
      월:"1월"
    },

    {
      사업소:"강릉사업소",
      계정과목:"복리후생비",
      금액:2400000,
      월:"2월"
    },

    {
      사업소:"강릉사업소",
      계정과목:"차량유지비",
      금액:3100000,
      월:"2월"
    }

  ];

  analyze(sample);

}

document
.getElementById("excelFile")
.addEventListener("change",handleFile);

function handleFile(e){

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event){

    const data = event.target.result;

    const workbook = XLSX.read(data,{
      type:"binary"
    });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet);

    analyze(json);

  };

  reader.readAsBinaryString(file);

}

function analyze(rows){

  const siteMap = {};
  const categoryMap = {};
  const monthMap = {};

  let totalCost = 0;

  rows.forEach(row=>{

    const site =
      row["사업소"] || "미분류";

    const category =
      row["계정과목"] || "기타";

    const month =
      row["월"] || "기타";

    const amount =
      Number(row["금액"] || 0);

    totalCost += amount;

    siteMap[site] =
      (siteMap[site] || 0) + amount;

    categoryMap[category] =
      (categoryMap[category] || 0) + amount;

    monthMap[month] =
      (monthMap[month] || 0) + amount;

  });

  const sales = 500000000;
  const target = 25;

  const profitRate =
    ((sales-totalCost)/sales)*100;

  const targetCost =
    sales - sales*(target/100);

  const cutAmount =
    totalCost - targetCost;

  document
  .getElementById("totalCost")
  .innerText =
    "₩"+totalCost.toLocaleString();

  document
  .getElementById("profitRate")
  .innerText =
    profitRate.toFixed(1)+"%";

  document
  .getElementById("cutAmount")
  .innerText =
    "₩"+Math.abs(cutAmount)
      .toLocaleString();

  renderCharts(
    siteMap,
    categoryMap,
    monthMap
  );

  renderSiteCards(siteMap);

  renderAI(
    categoryMap,
    profitRate,
    target,
    cutAmount
  );

}

function renderCharts(
  siteMap,
  categoryMap,
  monthMap
){

  if(siteChart) siteChart.destroy();
  if(categoryChart) categoryChart.destroy();
  if(monthChart) monthChart.destroy();

  Chart.defaults.color = "#cbd5e1";

  siteChart = new Chart(
    document.getElementById("siteChart"),
    {
      type:"doughnut",

      data:{
        labels:Object.keys(siteMap),

        datasets:[{
          data:Object.values(siteMap),
          borderWidth:0
        }]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    }
  );

  categoryChart = new Chart(
    document.getElementById("categoryChart"),
    {
      type:"bar",

      data:{
        labels:Object.keys(categoryMap),

        datasets:[{
          label:"비용",
          data:Object.values(categoryMap),
          borderRadius:10
        }]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    }
  );

  monthChart = new Chart(
    document.getElementById("monthChart"),
    {
      type:"line",

      data:{
        labels:Object.keys(monthMap),

        datasets:[{
          label:"월별 비용",
          data:Object.values(monthMap),
          tension:0.4
        }]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    }
  );

}

function renderSiteCards(siteMap){

  const wrap =
    document.getElementById("siteCards");

  wrap.innerHTML = "";

  const max =
    Math.max(...Object.values(siteMap));

  for(let site in siteMap){

    const cost = siteMap[site];

    let risk = "LOW";
    let riskClass = "low";

    if(cost > max * 0.7){

      risk = "HIGH";
      riskClass = "high";

    }else if(cost > max * 0.4){

      risk = "MEDIUM";
      riskClass = "medium";

    }

    wrap.innerHTML += `

      <div
        class="site-card"
        onclick="openDetail(
          '${site}',
          ${cost}
        )"
      >

        <div class="site-name">
          ${site}
        </div>

        <div class="site-cost">
          ₩${cost.toLocaleString()}
        </div>

        <div
          class="risk ${riskClass}"
        >
          ${risk} RISK
        </div>

      </div>

    `;

  }

}

function openDetail(site,cost){

  document
  .getElementById("detailPanel")
  .style.display = "block";

  document
  .getElementById("detailTitle")
  .innerText = site;

  document
  .getElementById("detailCosts")
  .innerHTML = `

    <div class="detail-item">
      총 비용 :
      ₩${cost.toLocaleString()}
    </div>

    <div class="detail-item">
      외주비 증가 추세 감지
    </div>

    <div class="detail-item">
      차량유지비 사용량 증가
    </div>

  `;

  document
  .getElementById("detailAI")
  .innerHTML = `

    <div class="detail-item">
      ⚠ 비용 증가 패턴 감지
    </div>

    <div class="detail-item">
      KPI 초과 가능성 존재
    </div>

    <div class="detail-item">
      AI 예측 :
      다음달 비용 증가 예상
    </div>

  `;

  window.scrollTo({
    top:
      document
      .getElementById("detailPanel")
      .offsetTop - 40,

    behavior:"smooth"
  });

}

function closeDetail(){

  document
  .getElementById("detailPanel")
  .style.display = "none";

}

function renderAI(
  categoryMap,
  profitRate,
  target,
  cutAmount
){

  const insights =
    document.getElementById("insights");

  insights.innerHTML="";

  let topCategory="";
  let max=0;

  for(let key in categoryMap){

    if(categoryMap[key]>max){

      max=categoryMap[key];
      topCategory=key;

    }

  }

  insights.innerHTML += `
    <div class="insight">
      ${topCategory} 비용 비중이 가장 높습니다.
    </div>
  `;

  if(profitRate < target){

    insights.innerHTML += `
      <div class="insight alert">
        목표 수익률 대비 부족합니다.
      </div>
    `;

    insights.innerHTML += `
      <div class="insight alert">
        ₩${Math.abs(cutAmount).toLocaleString()}
        절감 필요
      </div>
    `;

  }

}

</script>

</body>
</html>
