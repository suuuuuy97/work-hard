<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI 사업소 비용 분석 대시보드</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:30px;
      background:#f1f5f9;
      font-family:Arial;
    }

    h1,h2,h3{
      margin-top:0;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .card{
      background:white;
      border-radius:20px;
      padding:25px;
      margin-bottom:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .grid-4{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:20px;
    }

    .kpi{
      font-size:34px;
      font-weight:bold;
      margin-top:10px;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #d1d5db;
      margin-top:10px;
      font-size:16px;
    }

    canvas{
      max-height:400px;
    }

    .insight{
      background:#fee2e2;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
    }

    .suggestion{
      background:#dbeafe;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      border-bottom:1px solid #e5e7eb;
      padding:10px;
      text-align:left;
    }

    th{
      background:#f8fafc;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="card">

    <h1>AI 사업소 비용 분석 대시보드</h1>

    <p>
      사업소별 비용 / 수익률 / AI 비용 분석 / 목표 수익률 기반 비용 통제
    </p>

  </div>

  <div class="card">

    <h2>엑셀 업로드</h2>

    <input
      type="file"
      id="excelFile"
    />

    <p>
      필수 컬럼:
      사업소 / 계정과목 / 적요 / 금액 / 월
    </p>

  </div>

  <div class="grid-2">

    <div class="card">

      <h3>총 매출</h3>

      <input
        type="number"
        id="sales"
        value="500000000"
      />

    </div>

    <div class="card">

      <h3>목표 수익률 (%)</h3>

      <input
        type="number"
        id="targetProfit"
        value="25"
      />

    </div>

  </div>

  <div class="grid-4">

    <div class="card">

      <h3>총 비용</h3>

      <div class="kpi" id="totalCost">
        ₩0
      </div>

    </div>

    <div class="card">

      <h3>총 매출</h3>

      <div class="kpi" id="totalSales">
        ₩0
      </div>

    </div>

    <div class="card">

      <h3>현재 수익률</h3>

      <div class="kpi" id="profitRate">
        0%
      </div>

    </div>

    <div class="card">

      <h3>절감 필요 금액</h3>

      <div class="kpi" id="cutAmount">
        ₩0
      </div>

    </div>

  </div>

  <div class="grid-2">

    <div class="card">

      <h2>사업소별 비용 비중</h2>

      <canvas id="siteChart"></canvas>

    </div>

    <div class="card">

      <h2>계정과목별 비용</h2>

      <canvas id="categoryChart"></canvas>

    </div>

  </div>

  <div class="card">

    <h2>월별 비용 추이</h2>

    <canvas id="monthChart"></canvas>

  </div>

  <div class="card">

    <h2>사업소별 비용 현황</h2>

    <table>

      <thead>
        <tr>
          <th>사업소</th>
          <th>총 비용</th>
        </tr>
      </thead>

      <tbody id="siteTable"></tbody>

    </table>

  </div>

  <div class="card">

    <h2>AI 분석 결과</h2>

    <div id="insights"></div>

  </div>

  <div class="card">

    <h2>목표 수익률 기반 비용 통제 제안</h2>

    <div id="suggestions"></div>

  </div>

</div>

<script>

let siteChart;
let categoryChart;
let monthChart;

document
  .getElementById("excelFile")
  .addEventListener("change", handleFile);

function handleFile(e){

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event){

    const data = event.target.result;

    const workbook = XLSX.read(data,{
      type:"binary"
    });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet);

    analyzeData(json);

  };

  reader.readAsBinaryString(file);

}

function analyzeData(rows){

  const siteMap = {};
  const categoryMap = {};
  const monthMap = {};

  let totalCost = 0;

  rows.forEach(row=>{

    const site =
      row["사업소"] || "미분류";

    const category =
      row["계정과목"] || "기타";

    const month =
      row["월"] || "기타";

    const amount =
      Number(row["금액"] || 0);

    totalCost += amount;

    siteMap[site] =
      (siteMap[site] || 0) + amount;

    categoryMap[category] =
      (categoryMap[category] || 0) + amount;

    monthMap[month] =
      (monthMap[month] || 0) + amount;

  });

  const sales =
    Number(
      document
        .getElementById("sales")
        .value
    );

  const targetProfit =
    Number(
      document
        .getElementById("targetProfit")
        .value
    );

  const profitRate =
    ((sales-totalCost)/sales)*100;

  const targetCost =
    sales - sales*(targetProfit/100);

  const cutAmount =
    totalCost - targetCost;

  document
    .getElementById("totalCost")
    .innerText =
    "₩"+totalCost.toLocaleString();

  document
    .getElementById("totalSales")
    .innerText =
    "₩"+sales.toLocaleString();

  document
    .getElementById("profitRate")
    .innerText =
    profitRate.toFixed(1)+"%";

  document
    .getElementById("cutAmount")
    .innerText =
    "₩"+Math.abs(cutAmount)
      .toLocaleString();

  renderSiteChart(siteMap);
  renderCategoryChart(categoryMap);
  renderMonthChart(monthMap);

  renderInsights(
    totalCost,
    profitRate,
    targetProfit,
    categoryMap,
    cutAmount
  );

  renderSuggestions(
    profitRate,
    targetProfit
  );

  renderTable(siteMap);

}

function renderSiteChart(data){

  if(siteChart){
    siteChart.destroy();
  }

  siteChart = new Chart(
    document.getElementById("siteChart"),
    {
      type:"pie",
      data:{
        labels:Object.keys(data),
        datasets:[{
          data:Object.values(data)
        }]
      }
    }
  );

}

function renderCategoryChart(data){

  if(categoryChart){
    categoryChart.destroy();
  }

  categoryChart = new Chart(
    document.getElementById("categoryChart"),
    {
      type:"bar",
      data:{
        labels:Object.keys(data),
        datasets:[{
          label:"비용",
          data:Object.values(data)
        }]
      }
    }
  );

}

function renderMonthChart(data){

  if(monthChart){
    monthChart.destroy();
  }

  monthChart = new Chart(
    document.getElementById("monthChart"),
    {
      type:"line",
      data:{
        labels:Object.keys(data),
        datasets:[{
          label:"월별 비용",
          data:Object.values(data)
        }]
      }
    }
  );

}

function renderTable(siteMap){

  const table =
    document.getElementById("siteTable");

  table.innerHTML = "";

  for(let site in siteMap){

    table.innerHTML += `
      <tr>
        <td>${site}</td>
        <td>
          ₩${siteMap[site].toLocaleString()}
        </td>
      </tr>
    `;

  }

}

function renderInsights(
  totalCost,
  profitRate,
  targetProfit,
  categoryMap,
  cutAmount
){

  const insights =
    document.getElementById("insights");

  insights.innerHTML = "";

  let topCategory = "";
  let max = 0;

  for(let key in categoryMap){

    if(categoryMap[key] > max){

      max = categoryMap[key];
      topCategory = key;

    }

  }

  insights.innerHTML += `
    <div class="insight">
      ${topCategory} 비용 비중이 가장 높습니다.
    </div>
  `;

  if(profitRate < targetProfit){

    insights.innerHTML += `
      <div class="insight">
        목표 수익률 대비 부족합니다.
      </div>
    `;

    insights.innerHTML += `
      <div class="insight">
        약 ₩${Math.abs(cutAmount).toLocaleString()}
        비용 절감이 필요합니다.
      </div>
    `;

  }else{

    insights.innerHTML += `
      <div class="insight">
        목표 수익률을 달성 중입니다.
      </div>
    `;

  }

}

function renderSuggestions(
  profitRate,
  targetProfit
){

  const suggestions =
    document.getElementById("suggestions");

  suggestions.innerHTML = "";

  if(profitRate < targetProfit){

    suggestions.innerHTML += `
      <div class="suggestion">
        외주비/차량유지비 우선 절감 검토
      </div>
    `;

    suggestions.innerHTML += `
      <div class="suggestion">
        사업소별 예산 상한 설정 권장
      </div>
    `;

    suggestions.innerHTML += `
      <div class="suggestion">
        회의비 승인 프로세스 강화 필요
      </div>
    `;

    suggestions.innerHTML += `
      <div class="suggestion">
        고비용 사업소 집중 모니터링 권장
      </div>
    `;

  }else{

    suggestions.innerHTML += `
      <div class="suggestion">
        현재 비용 구조 안정적
      </div>
    `;

  }

}

</script>

</body>
</html>
