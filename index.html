<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Financial Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1120;
  color:white;
  font-family:'Inter',sans-serif;
}

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(
      circle at top left,
      rgba(37,99,235,0.16),
      transparent 28%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(59,130,246,0.14),
      transparent 30%
    );

  z-index:-1;

}

.container{
  max-width:1700px;
  margin:auto;
  padding:28px;
}

/* HEADER */

.header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:28px;

}

.header h1{

  font-size:42px;
  font-weight:800;

}

.header p{

  margin-top:8px;
  color:#94a3b8;

}

.header-right{

  display:flex;
  gap:14px;

}

.header-box{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:18px;

  padding:14px 18px;

  color:#cbd5e1;

}

.status{

  color:#4ade80;
  font-weight:700;

}

/* GRID */

.grid-4{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:20px;

  margin-bottom:24px;

}

.grid-3{

  display:grid;

  grid-template-columns:
    1.2fr 1fr 1fr;

  gap:20px;

  margin-bottom:24px;

}

.grid-2{

  display:grid;

  grid-template-columns:
    1fr 1fr;

  gap:20px;

  margin-bottom:24px;

}

/* CARD */

.card{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:26px;

  padding:24px;

  position:relative;

  overflow:hidden;

}

.card::before{

  content:"";

  position:absolute;

  width:180px;
  height:180px;

  background:
    radial-gradient(
      rgba(59,130,246,0.12),
      transparent 70%
    );

  top:-60px;
  right:-60px;

}

.card-title{

  color:#94a3b8;
  font-size:14px;

}

.kpi{

  font-size:38px;
  font-weight:800;

  margin-top:14px;

}

.blue{
  color:#60a5fa;
}

.green{
  color:#4ade80;
}

.red{
  color:#fb7185;
}

.orange{
  color:#f59e0b;
}

/* INPUT */

.upload{

  border:
    2px dashed rgba(255,255,255,0.08);

  border-radius:18px;

  padding:30px;

  text-align:center;

}

.upload input{

  width:100%;

  padding:16px;

  border:none;

  border-radius:14px;

  background:#1e293b;

  color:white;

}

.upload p{

  margin-top:14px;

  color:#94a3b8;

}

/* SITE CARD */

.site-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

  gap:20px;

  margin-bottom:24px;

}

.site-card{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:24px;

  padding:22px;

  transition:0.25s;

  cursor:pointer;

}

.site-card:hover{

  transform:
    translateY(-5px);

  border-color:
    rgba(59,130,246,0.35);

  box-shadow:
    0 16px 30px rgba(37,99,235,0.12);

}

.site-name{

  font-size:18px;
  font-weight:700;

}

.site-cost{

  font-size:34px;
  font-weight:800;

  margin-top:14px;

}

.site-sub{

  margin-top:10px;

  color:#94a3b8;

  font-size:14px;

}

.risk{

  margin-top:16px;

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

}

.high{
  background:#7f1d1d;
  color:#fecaca;
}

.medium{
  background:#78350f;
  color:#fde68a;
}

.low{
  background:#14532d;
  color:#bbf7d0;
}

/* AI */

.ai-box{

  background:#1e293b;

  border-left:
    4px solid #3b82f6;

  padding:18px;

  border-radius:16px;

  margin-bottom:14px;

}

.ai-alert{

  border-left-color:#ef4444;

}

/* DETAIL */

.detail-item{

  background:#1e293b;

  padding:16px;

  border-radius:14px;

  margin-bottom:12px;

}

/* CHART */

.chart-box{

  height:360px;

}

/* TABLE */

table{

  width:100%;
  border-collapse:collapse;

}

th,td{

  padding:14px;

  border-bottom:
    1px solid rgba(255,255,255,0.06);

}

th{

  color:#94a3b8;
  text-align:left;

}

.table-wrap{
  overflow:auto;
}

/* MOBILE */

@media(max-width:1300px){

  .grid-4{
    grid-template-columns:
      1fr 1fr;
  }

  .grid-3{
    grid-template-columns:1fr;
  }

}

@media(max-width:900px){

  .grid-2,
  .grid-4{
    grid-template-columns:1fr;
  }

  .header{

    flex-direction:column;
    align-items:flex-start;
    gap:20px;

  }

}

</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    <div>

      <h1>
        Financial Intelligence
      </h1>

      <p>
        AI 기반 사업소 비용 관제 시스템
      </p>

    </div>

    <div class="header-right">

      <div class="header-box status">
        ● AI NORMAL
      </div>

      <div class="header-box">
        LIVE DASHBOARD
      </div>

    </div>

  </div>

  <!-- UPLOAD -->

  <div class="card">

    <div class="upload">

      <input
        type="file"
        id="excelFile"
      />

      <p>
        업로드 즉시 AI 분석 시작
      </p>

    </div>

  </div>

  <!-- KPI -->

  <div class="grid-4">

    <div class="card">

      <div class="card-title">
        TOTAL COST
      </div>

      <div
        class="kpi red"
        id="totalCost"
      >
        ₩0
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        PROFIT RATE
      </div>

      <div
        class="kpi green"
        id="profitRate"
      >
        0%
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        TOP COST CENTER
      </div>

      <div
        class="kpi blue"
        id="topSite"
      >
        -
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        RISK LEVEL
      </div>

      <div
        class="kpi orange"
        id="riskLevel"
      >
        LOW
      </div>

    </div>

  </div>

  <!-- 사업소 카드 -->

  <div
    class="site-grid"
    id="siteCards"
  ></div>

  <!-- CHART -->

  <div class="grid-3">

    <div class="card">

      <div class="card-title">
        사업소 비용 비중
      </div>

      <div class="chart-box">
        <canvas id="siteChart"></canvas>
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        계정과목 분석
      </div>

      <div class="chart-box">
        <canvas id="categoryChart"></canvas>
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        AI INSIGHT
      </div>

      <div id="aiInsights"></div>

    </div>

  </div>

  <!-- DETAIL -->

  <div
    class="card"
    id="detailPanel"
    style="display:none;"
  >

    <div
      style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:24px;
      "
    >

      <div>

        <div
          id="detailTitle"
          style="
            font-size:28px;
            font-weight:800;
          "
        >
        </div>

        <div
          style="
            color:#94a3b8;
            margin-top:8px;
          "
        >
          사업소 상세 비용 분석
        </div>

      </div>

      <button

        onclick="closeDetail()"

        style="
          background:#1e293b;
          color:white;
          border:none;
          border-radius:12px;
          padding:10px 16px;
          cursor:pointer;
        "

      >
        닫기
      </button>

    </div>

    <div class="grid-2">

      <div>

        <div
          class="card-title"
          style="margin-bottom:12px;"
        >
          비용 내역
        </div>

        <div id="detailCosts"></div>

      </div>

      <div>

        <div
          class="card-title"
          style="margin-bottom:12px;"
        >
          AI 분석
        </div>

        <div id="detailAI"></div>

      </div>

    </div>

  </div>

</div>

<script>

let rawRows = [];

let siteChart;
let categoryChart;

document
.getElementById("excelFile")
.addEventListener("change",handleFile);

function handleFile(e){

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event){

    const data = event.target.result;

    const workbook = XLSX.read(data,{
      type:"binary"
    });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet);

    rawRows = json;

    analyze(json);

  };

  reader.readAsBinaryString(file);

}

function analyze(rows){

  const siteMap = {};
  const categoryMap = {};

  let totalCost = 0;

  rows.forEach(row=>{

    const category =
      row["계정과목"] || "기타";

    Object.keys(row).forEach(key=>{

      if(key !== "계정과목"){

        const amount =
          Number(
            String(
              row[key] || 0
            ).replace(/,/g,"")
          );

        if(!isNaN(amount)){

          totalCost += amount;

          siteMap[key] =
            (siteMap[key] || 0)
            + amount;

          categoryMap[category] =
            (categoryMap[category] || 0)
            + amount;

        }

      }

    });

  });

  const sales = 500000000;

  const profitRate =
    ((sales-totalCost)/sales)*100;

  let topSite = "";
  let max = 0;

  for(let site in siteMap){

    if(siteMap[site] > max){

      max = siteMap[site];
      topSite = site;

    }

  }

  let riskLevel = "LOW";

  if(profitRate < 80){

    riskLevel = "HIGH";

  }else if(profitRate < 90){

    riskLevel = "MEDIUM";

  }

  document
  .getElementById("totalCost")
  .innerText =
    "₩"+totalCost.toLocaleString();

  document
  .getElementById("profitRate")
  .innerText =
    profitRate.toFixed(1)+"%";

  document
  .getElementById("topSite")
  .innerText =
    topSite;

  document
  .getElementById("riskLevel")
  .innerText =
    riskLevel;

  renderSiteCards(siteMap);

  renderCharts(
    siteMap,
    categoryMap
  );

  renderAI(
    categoryMap,
    topSite,
    profitRate
  );

}

function renderSiteCards(siteMap){

  const wrap =
    document.getElementById("siteCards");

  wrap.innerHTML = "";

  const max =
    Math.max(...Object.values(siteMap));

  for(let site in siteMap){

    const cost = siteMap[site];

    let risk = "LOW";
    let riskClass = "low";

    if(cost > max * 0.7){

      risk = "HIGH";
      riskClass = "high";

    }else if(cost > max * 0.4){

      risk = "MEDIUM";
      riskClass = "medium";

    }

    wrap.innerHTML += `

      <div
        class="site-card"
        onclick="openDetail(
          '${site}',
          ${cost}
        )"
      >

        <div class="site-name">
          ${site}
        </div>

        <div class="site-cost">
          ₩${cost.toLocaleString()}
        </div>

        <div class="site-sub">
          AI Cost Monitoring
        </div>

        <div
          class="risk ${riskClass}"
        >
          ${risk} RISK
        </div>

      </div>

    `;

  }

}

function renderCharts(
  siteMap,
  categoryMap
){

  if(siteChart) siteChart.destroy();
  if(categoryChart) categoryChart.destroy();

  Chart.defaults.color = "#cbd5e1";

  siteChart = new Chart(
    document.getElementById("siteChart"),
    {

      type:"doughnut",

      data:{

        labels:Object.keys(siteMap),

        datasets:[{

          data:Object.values(siteMap),

          backgroundColor:[
            "#3b82f6",
            "#60a5fa",
            "#2563eb",
            "#1d4ed8",
            "#93c5fd"
          ],

          borderWidth:0

        }]

      },

      options:{

        responsive:true,
        maintainAspectRatio:false,

        plugins:{
          legend:{
            position:"bottom"
          }
        }

      }

    }
  );

  categoryChart = new Chart(
    document.getElementById("categoryChart"),
    {

      type:"bar",

      data:{

        labels:Object.keys(categoryMap),

        datasets:[{

          label:"비용",

          data:Object.values(categoryMap),

          backgroundColor:"#3b82f6",

          borderRadius:12

        }]

      },

      options:{

        responsive:true,
        maintainAspectRatio:false,

        plugins:{
          legend:{
            display:false
          }
        }

      }

    }
  );

}

function renderAI(
  categoryMap,
  topSite,
  profitRate
){

  const insights =
    document.getElementById("aiInsights");

  insights.innerHTML = "";

  let topCategory = "";
  let max = 0;

  for(let key in categoryMap){

    if(categoryMap[key] > max){

      max = categoryMap[key];
      topCategory = key;

    }

  }

  insights.innerHTML += `

    <div class="ai-box">

      ${topCategory}
      비용 비중이 가장 높습니다.

    </div>

  `;

  insights.innerHTML += `

    <div class="ai-box ai-alert">

      ${topSite}
      비용 집중도가 높습니다.

    </div>

  `;

  if(profitRate < 80){

    insights.innerHTML += `

      <div class="ai-box ai-alert">

        목표 수익률 대비
        비용 통제가 필요합니다.

      </div>

    `;

  }else{

    insights.innerHTML += `

      <div class="ai-box">

        현재 비용 구조 안정적

      </div>

    `;

  }

}

function openDetail(site,cost){

  document
  .getElementById("detailPanel")
  .style.display = "block";

  document
  .getElementById("detailTitle")
  .innerText = site;

  let detailHtml = "";

  rawRows.forEach(row=>{

    const category =
      row["계정과목"];

    const amount =
      Number(
        String(
          row[site] || 0
        ).replace(/,/g,"")
      );

    if(amount > 0){

      detailHtml += `

        <div class="detail-item">

          ${category}

          :
          ₩${amount.toLocaleString()}

        </div>

      `;

    }

  });

  document
  .getElementById("detailCosts")
  .innerHTML =
    detailHtml;

  document
  .getElementById("detailAI")
  .innerHTML = `

    <div class="detail-item">
      ⚠ 비용 증가 패턴 감지
    </div>

    <div class="detail-item">
      외주비 비중 증가 추세
    </div>

    <div class="detail-item">
      예산 초과 가능성 존재
    </div>

    <div class="detail-item">
      AI 권장 :
      차량유지비 우선 통제
    </div>

  `;

  window.scrollTo({

    top:
      document
      .getElementById("detailPanel")
      .offsetTop - 40,

    behavior:"smooth"

  });

}

function closeDetail(){

  document
  .getElementById("detailPanel")
  .style.display = "none";

}

</script>

</body>
</html>
