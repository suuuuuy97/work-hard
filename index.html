<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>캡스 손익 분석 가즈아!</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b1120;
  color:white;
  font-family:'Inter',sans-serif;
}

body::before{

  content:"";

  position:fixed;
  inset:0;

  background:

    radial-gradient(
      circle at top left,
      rgba(37,99,235,0.16),
      transparent 28%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(59,130,246,0.12),
      transparent 30%
    );

  z-index:-1;

}

.container{
  max-width:1800px;
  margin:auto;
  padding:28px;
}

/* HEADER */

.header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:28px;

}

.header h1{
  font-size:42px;
  font-weight:800;
}

.header p{
  margin-top:8px;
  color:#94a3b8;
}

.header-right{
  display:flex;
  gap:14px;
}

.header-box{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:18px;

  padding:14px 18px;

  color:#cbd5e1;

}

.status{
  color:#4ade80;
  font-weight:700;
}

/* CARD */

.card{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:26px;

  padding:24px;

  position:relative;

  overflow:hidden;

  margin-bottom:24px;

}

.card::before{

  content:"";

  position:absolute;

  width:180px;
  height:180px;

  background:
    radial-gradient(
      rgba(59,130,246,0.12),
      transparent 70%
    );

  top:-60px;
  right:-60px;

}

.card-title{
  color:#94a3b8;
  font-size:14px;
}

/* KPI */

.grid-4{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:20px;

  margin-bottom:24px;

}

.kpi{

  font-size:38px;
  font-weight:800;

  margin-top:14px;

}

.blue{
  color:#60a5fa;
}

.green{
  color:#4ade80;
}

.red{
  color:#fb7185;
}

.orange{
  color:#f59e0b;
}

/* UPLOAD */

.upload{

  border:
    2px dashed rgba(255,255,255,0.08);

  border-radius:18px;

  padding:30px;

  text-align:center;

}

.upload input{

  width:100%;

  padding:16px;

  border:none;

  border-radius:14px;

  background:#1e293b;

  color:white;

}

.upload p{

  margin-top:14px;
  color:#94a3b8;

}

/* SITE */

.site-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

  gap:20px;

  margin-bottom:24px;

}

.site-card{

  background:#111827;

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:24px;

  padding:22px;

  cursor:pointer;

  transition:0.25s;

}

.site-card:hover{

  transform:
    translateY(-5px);

  border-color:
    rgba(59,130,246,0.35);

  box-shadow:
    0 16px 30px rgba(37,99,235,0.12);

}

.site-name{
  font-size:20px;
  font-weight:700;
}

.site-profit{

  font-size:40px;
  font-weight:800;

  margin-top:14px;

}

.site-info{

  margin-top:14px;

  color:#cbd5e1;

  line-height:2;

  font-size:14px;

}

.risk{

  margin-top:18px;

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

}

.high{
  background:#7f1d1d;
  color:#fecaca;
}

.medium{
  background:#78350f;
  color:#fde68a;
}

.low{
  background:#14532d;
  color:#bbf7d0;
}

/* CHART */

.grid-3{

  display:grid;

  grid-template-columns:
    1fr 1fr 1fr;

  gap:20px;

  margin-bottom:24px;

}

.chart-box{
  height:350px;
}

/* DETAIL */

#detailPage{
  display:none;
}

.detail-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

  gap:18px;

}

.detail-item{

  background:#1e293b;

  border-radius:18px;

  padding:20px;

}

.analysis-item{

  background:#1e293b;

  border-left:
    4px solid #3b82f6;

  border-radius:18px;

  padding:20px;

  margin-bottom:16px;

}

/* AI */

.ai-box{

  background:#1e293b;

  border-left:
    4px solid #3b82f6;

  border-radius:16px;

  padding:18px;

  margin-bottom:14px;

}

.ai-alert{
  border-left-color:#ef4444;
}

@media(max-width:1300px){

  .grid-4{
    grid-template-columns:
      1fr 1fr;
  }

  .grid-3{
    grid-template-columns:1fr;
  }

}

@media(max-width:900px){

  .grid-4{
    grid-template-columns:1fr;
  }

  .header{

    flex-direction:column;
    align-items:flex-start;
    gap:20px;

  }

}

</style>

</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    <div>

      <h1>
        Financial Intelligence
      </h1>

      <p>
        캡스 손익 분석, 마이너스는 죽음뿐.
      </p>

    </div>

    <div class="header-right">

      <div class="header-box status">
        ● AI NORMAL
      </div>

      <div class="header-box">
        LIVE ANALYTICS
      </div>

    </div>

  </div>

  <!-- 업로드 -->

  <div class="card">

    <div class="upload">

      <input
        type="file"
        id="excelFile"
      />

      <p>
        사업소 손익 엑셀 업로드
      </p>

    </div>

  </div>

  <!-- KPI -->

  <div class="grid-4">

    <div class="card">

      <div class="card-title">
        TOTAL SALES
      </div>

      <div
        class="kpi blue"
        id="totalSales"
      >
        0억
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        TOTAL COST
      </div>

      <div
        class="kpi red"
        id="totalCost"
      >
        0억
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        OPERATING PROFIT
      </div>

      <div
        class="kpi green"
        id="totalProfit"
      >
        0억
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        PROFIT RATE
      </div>

      <div
        class="kpi orange"
        id="profitRate"
      >
        0%
      </div>

    </div>

  </div>

  <!-- 사업소 -->

  <div
    class="site-grid"
    id="siteCards"
  ></div>

  <!-- 상세 페이지 -->

  <div
    id="detailPage"
    class="card"
  >

    <div
      style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:28px;
      "
    >

      <div>

        <div
          id="detailSiteName"
          style="
            font-size:36px;
            font-weight:800;
          "
        >
        </div>

        <div
          style="
            margin-top:10px;
            color:#94a3b8;
          "
        >
          사업소 상세 분석
        </div>

      </div>

      <button

        onclick="closeDetail()"

        style="
          border:none;
          background:#1e293b;
          color:white;
          padding:12px 18px;
          border-radius:12px;
          cursor:pointer;
        "

      >
        닫기
      </button>

    </div>

    <!-- 사업소 KPI -->

    <div class="grid-4">

      <div class="detail-item">

        <div style="color:#94a3b8;">
          매출
        </div>

        <div
          id="detailSales"
          style="
            margin-top:12px;
            font-size:28px;
            font-weight:800;
            color:#60a5fa;
          "
        >
        </div>

      </div>

      <div class="detail-item">

        <div style="color:#94a3b8;">
          비용
        </div>

        <div
          id="detailCost"
          style="
            margin-top:12px;
            font-size:28px;
            font-weight:800;
            color:#fb7185;
          "
        >
        </div>

      </div>

      <div class="detail-item">

        <div style="color:#94a3b8;">
          영업이익
        </div>

        <div
          id="detailProfit"
          style="
            margin-top:12px;
            font-size:28px;
            font-weight:800;
            color:#4ade80;
          "
        >
        </div>

      </div>

      <div class="detail-item">

        <div style="color:#94a3b8;">
          수익률
        </div>

        <div
          id="detailRate"
          style="
            margin-top:12px;
            font-size:28px;
            font-weight:800;
            color:#f59e0b;
          "
        >
        </div>

      </div>

    </div>

    <!-- 프로젝트 -->

    <div
      style="
        margin-top:30px;
        margin-bottom:24px;
      "
    >

      <div
        style="
          font-size:24px;
          font-weight:800;
          margin-bottom:20px;
        "
      >
        프로젝트별 손익 분석
      </div>

      <div
        class="detail-grid"
        id="projectGrid"
      ></div>

    </div>

    <!-- 계정원장 업로드 -->

    <div class="card">

      <div class="upload">

        <input
          type="file"
          id="ledgerFile"
        />

        <p>
          계정과목원장 업로드 후 AI 비용 분석
        </p>

      </div>

    </div>

    <!-- AI 분석 -->

    <div id="ledgerAnalysis"></div>

  </div>

  <!-- 차트 -->

  <div class="grid-3">

    <div class="card">

      <div class="card-title">
        사업소별 비용 비중
      </div>

      <div class="chart-box">
        <canvas id="siteChart"></canvas>
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        사업소별 영업이익
      </div>

      <div class="chart-box">
        <canvas id="profitChart"></canvas>
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        AI INSIGHT
      </div>

      <div id="aiInsights"></div>

    </div>

  </div>

</div>

<script>

let rawRows = [];
let globalSiteMap = {};
let currentSite = "";

let siteChart;
let profitChart;

/*
========================================
억원 변환
========================================
*/

function toEok(value){

  return (

    value / 100000000

  ).toFixed(1) + "억";

}

document
.getElementById("excelFile")
.addEventListener("change",handleFile);

document
.getElementById("ledgerFile")
.addEventListener("change",handleLedgerFile);

/*
========================================
메인 파일 업로드
========================================
*/

function handleFile(e){

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event){

    const data = event.target.result;

    const workbook = XLSX.read(data,{
      type:"binary"
    });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet,{
        header:1
      });

    rawRows = json;

    analyze(json);

  };

  reader.readAsBinaryString(file);

}

/*
========================================
손익 분석
========================================
*/

function analyze(rows){

  const siteMap = {};

  let totalSales = 0;
  let totalCost = 0;
  let totalProfit = 0;

  const siteHeader = rows[7];
  const projectHeader = rows[10];

  const projectColumns = [];

  siteHeader.forEach((site,index)=>{

    const project =
      projectHeader?.[index];

    if(
      index >= 2 &&
      site &&
      project &&
      site !== "합계"
    ){

      projectColumns.push({
        index,
        site,
        project
      });

    }

  });

  /*
    사업소 초기화
  */

  projectColumns.forEach(col=>{

    if(!siteMap[col.site]){

      siteMap[col.site] = {

        sales:0,
        cost:0,
        profit:0,
        rate:0

      };

    }

  });

  /*
    매출액
    12행
  */

  const salesRow = rows[11];

  projectColumns.forEach(col=>{

    const sales = Number(
      String(
        salesRow?.[col.index] || 0
      ).replace(/,/g,"")
    );

    siteMap[col.site].sales += sales;

    totalSales += sales;

  });

  /*
    비용
    13~68행
  */

  rows.slice(12,68).forEach(row=>{

    projectColumns.forEach(col=>{

      const amount = Number(
        String(
          row[col.index] || 0
        ).replace(/,/g,"")
      );

      if(!isNaN(amount) && amount > 0){

        siteMap[col.site].cost += amount;

        totalCost += amount;

      }

    });

  });

  /*
    영업이익
    69행
  */

  const profitRow = rows[68];

  projectColumns.forEach(col=>{

    const profit = Number(
      String(
        profitRow?.[col.index] || 0
      ).replace(/,/g,"")
    );

    siteMap[col.site].profit += profit;

    totalProfit += profit;

  });

  /*
    수익률
  */

  for(let site in siteMap){

    const data = siteMap[site];

    data.rate =

      data.sales > 0

      ?

      (
        data.profit /
        data.sales
      ) * 100

      :

      0;

  }

  globalSiteMap = siteMap;

  const totalRate =

    totalSales > 0

    ?

    (totalProfit / totalSales) * 100

    :

    0;

  /*
    KPI
  */

  document
  .getElementById("totalSales")
  .innerText =
    toEok(totalSales);

  document
  .getElementById("totalCost")
  .innerText =
    toEok(totalCost);

  document
  .getElementById("totalProfit")
  .innerText =
    toEok(totalProfit);

  document
  .getElementById("profitRate")
  .innerText =
    totalRate.toFixed(1)+"%";

  renderSiteCards(siteMap);

  renderCharts(siteMap);

  renderAI(totalRate);

}

/*
========================================
사업소 카드
========================================
*/

function renderSiteCards(siteMap){

  const wrap =
    document.getElementById("siteCards");

  wrap.innerHTML = "";

  const sortedSites =

    Object.entries(siteMap)

    .sort(
      (a,b)=>
      b[1].cost - a[1].cost
    );

  sortedSites.forEach(([site,data])=>{

    let risk = "LOW";
    let riskClass = "low";

    if(data.rate < 5){

      risk = "HIGH";
      riskClass = "high";

    }

    else if(data.rate < 15){

      risk = "MEDIUM";
      riskClass = "medium";

    }

    wrap.innerHTML += `

      <div
        class="site-card"
        onclick="openDetail('${site}')"
      >

        <div class="site-name">
          ${site}
        </div>

        <div class="site-profit">
          ${data.rate.toFixed(1)}%
        </div>

        <div class="site-info">

          매출 :
          ${toEok(data.sales)}

          <br>

          비용 :
          ${toEok(data.cost)}

          <br>

          영업이익 :
          ${toEok(data.profit)}

        </div>

        <div
          class="risk ${riskClass}"
        >
          ${risk} RISK
        </div>

      </div>

    `;

  });

}

/*
========================================
차트
========================================
*/

function renderCharts(siteMap){

  if(siteChart) siteChart.destroy();
  if(profitChart) profitChart.destroy();

  Chart.defaults.color = "#cbd5e1";

  const sortedSites =

    Object.entries(siteMap)

    .sort(
      (a,b)=>
      b[1].cost - a[1].cost
    );

  siteChart = new Chart(
    document.getElementById("siteChart"),
    {

      type:"bar",

      data:{

        labels:
          sortedSites.map(v=>v[0]),

        datasets:[{

          label:"비용",

          data:
            sortedSites.map(v=>v[1].cost),

          backgroundColor:"#3b82f6",

          borderRadius:12

        }]

      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    }
  );

  profitChart = new Chart(
    document.getElementById("profitChart"),
    {

      type:"bar",

      data:{

        labels:
          sortedSites.map(v=>v[0]),

        datasets:[{

          label:"영업이익",

          data:
            sortedSites.map(v=>v[1].profit),

          backgroundColor:"#4ade80",

          borderRadius:12

        }]

      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    }
  );

}

/*
========================================
AI 인사이트
========================================
*/

function renderAI(totalRate){

  const insights =
    document.getElementById("aiInsights");

  insights.innerHTML = "";

  if(totalRate < 10){

    insights.innerHTML += `

      <div class="ai-box ai-alert">

        수익률이 낮습니다.
        비용 통제 필요.

      </div>

    `;

  }

  else{

    insights.innerHTML += `

      <div class="ai-box">

        현재 손익 구조 안정적

      </div>

    `;

  }

}

/*
========================================
상세페이지
========================================
*/

function openDetail(site){

  currentSite = site;

  const detailPage =
    document.getElementById(
      "detailPage"
    );

  detailPage.style.display = "block";

  window.scrollTo({

    top:
      detailPage.offsetTop - 40,

    behavior:"smooth"

  });

  const data =
    globalSiteMap[site];

  /*
    KPI
  */

  document
  .getElementById("detailSiteName")
  .innerText = site;

  document
  .getElementById("detailSales")
  .innerText =
    toEok(data.sales);

  document
  .getElementById("detailCost")
  .innerText =
    toEok(data.cost);

  document
  .getElementById("detailProfit")
  .innerText =
    toEok(data.profit);

  document
  .getElementById("detailRate")
  .innerText =
    data.rate.toFixed(1)+"%";

  /*
    프로젝트 분석
  */

  const siteHeader =
    rawRows[7];

  const projectHeader =
    rawRows[10];

  let projectHtml = "";

  siteHeader.forEach((value,index)=>{

    if(value === site){

      const projectName =
        projectHeader[index];

      const sales = Number(
        String(
          rawRows[11]?.[index] || 0
        ).replace(/,/g,"")
      );

      const profit = Number(
        String(
          rawRows[68]?.[index] || 0
        ).replace(/,/g,"")
      );

      let cost = 0;

      rawRows
      .slice(12,68)
      .forEach(row=>{

        const amount = Number(
          String(
            row[index] || 0
          ).replace(/,/g,"")
        );

        if(!isNaN(amount)){

          cost += amount;

        }

      });

      const rate =

        sales > 0

        ?

        (
          profit / sales
        ) * 100

        :

        0;

      projectHtml += `

        <div class="detail-item">

          <div
            style="
              color:#94a3b8;
              font-size:13px;
            "
          >
            프로젝트
          </div>

          <div
            style="
              margin-top:10px;
              font-size:20px;
              font-weight:700;
            "
          >
            ${projectName}
          </div>

          <div
            style="
              margin-top:18px;
              line-height:2;
              color:#cbd5e1;
            "
          >

            매출 :
            ${toEok(sales)}

            <br>

            비용 :
            ${toEok(cost)}

            <br>

            영업이익 :
            ${toEok(profit)}

            <br>

            수익률 :
            ${rate.toFixed(1)}%

          </div>

        </div>

      `;

    }

  });

  document
  .getElementById("projectGrid")
  .innerHTML =
    projectHtml;

}

/*
========================================
닫기
========================================
*/

function closeDetail(){

  document
  .getElementById("detailPage")
  .style.display = "none";

}

/*
========================================
계정원장 분석
========================================
*/

function handleLedgerFile(e){

  const file = e.target.files[0];

  const reader = new FileReader();

  reader.onload = function(event){

    const data = event.target.result;

    const workbook = XLSX.read(data,{
      type:"binary"
    });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet);

    analyzeLedger(json);

  };

  reader.readAsBinaryString(file);

}

function analyzeLedger(rows){

  const accountMap = {};

  rows.forEach(row=>{

    let amount = 0;

    Object.values(row).forEach(v=>{

      const n = Number(
        String(v)
        .replace(/,/g,"")
      );

      if(!isNaN(n) && n > amount){

        amount = n;

      }

    });

    let account = "기타";

    Object.values(row).forEach(v=>{

      if(

        typeof v === "string" &&

        v.length >= 2 &&

        !v.includes(currentSite)

      ){

        account = v;

      }

    });

    accountMap[account] =

      (accountMap[account] || 0)
      + amount;

  });

  const sorted =

    Object.entries(accountMap)

    .sort((a,b)=>b[1]-a[1])
    .slice(0,10);

  let html = "";

  sorted.forEach(([name,value],index)=>{

    html += `

      <div class="analysis-item">

        <div
          style="
            color:#94a3b8;
            font-size:13px;
          "
        >
          TOP ${index+1}
        </div>

        <div
          style="
            margin-top:10px;
            font-size:22px;
            font-weight:700;
          "
        >
          ${name}
        </div>

        <div
          style="
            margin-top:16px;
            font-size:30px;
            font-weight:800;
            color:#60a5fa;
          "
        >
          ${toEok(value)}
        </div>

      </div>

    `;

  });

  html += `

    <div class="analysis-item">

      AI 분석 결과 :
      ${currentSite} 사업소는 특정 비용 계정 사용 비중이 높습니다.
      반복 지출 항목 및 외주성 비용 검토가 필요합니다.

    </div>

  `;

  document
  .getElementById("ledgerAnalysis")
  .innerHTML = html;

}
